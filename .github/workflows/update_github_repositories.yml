name: Update GitHub Repositories

on:
  schedule:
    - cron: '0 0 1 * *'  # Run once a month on the 1st
  workflow_dispatch:   # manual trigger

jobs:
  update-github:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Update GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python sources/github/update_github_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sources/github/repos.json sources/github/commits/*.json
          git commit -m "Update GitHub repository metadata and commits" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}
