name: Update Statistics

on:
  schedule:
    - cron: '0 0 1 * *'  # Run once a month on the 1st
  workflow_dispatch:   # manual trigger
  repository_dispatch:
    types: [trigger-from-repo-quartz]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow pushing commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Update GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python sources/github/update_github_data.py

      - name: Run update script
        run: python python/update_statistics.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/iteration.json data/version.txt README.md sources/github/repos.json sources/github/commits/*.json
          git commit -m "Update statistics for diary, projects, blog and GitHub data" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}
